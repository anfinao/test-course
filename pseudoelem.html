<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles/pseudoelements.css">
</head>

<body>
    <p class="quote">Важная цитата</p>

    <p class="article">Этот текст начинается с большой буквы и первая строка будет выделена жирным шрифтом для
        привлечения внимания.</p>

    <div>
        <label for="styled-input">Стилизованный плейсхолдер</label>
        <input type="text" id="styled-input" class="styled-placeholder" placeholder="Введите ваш логин...">
    </div>

    <div>
        <label for="simple-input">Нестилизованный плейсхолдер</label>
        <input type="text" id="simple-input" placeholder="Введите ваш логин...">
    </div>

    <p class="styled-p">Выделите этот текст мышкой, чтобы увидеть эффект.</p>

    <ul class="style-marker">
        <li>Пункт один</li>
        <li>Пункт два</li>
    </ul>
</body>

</html>
