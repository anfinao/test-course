<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox</title>
    <link href="./main.css" rel="stylesheet">
</head>

<body>
    <div class="flex-container">
        <div class="block">1</div>
        <div class="block">2</div>
        <div class="block">3</div>
        <div class="block">4</div>
        <div class="block">5</div>
        <div class="block">6</div>
        <div class="block">7</div>
        <div class="block">8</div>
        <div class="block">9</div>
        <div class="block">10</div>
        <div class="block">11</div>
    </div>

    <h3 class="example-title">flex-direction: row-reverse</h3>
    <section class="direction-reverse">
        <div class="block">1</div>
        <div class="block">2</div>
        <div class="block">3</div>
        <div class="block">4</div>
        <div class="block">5</div>
        <div class="block">6</div>
        <div class="block">7</div>
        <div class="block">8</div>
        <div class="block">9</div>
        <div class="block">10</div>
        <div class="block">11</div>
    </section>

    <h3 class="example-title">flex-direction: column</h3>
    <section class="direction-column">
        <div class="block">1</div>
        <div class="block">2</div>
        <div class="block">3</div>
    </section>

    <h3 class="example-title">flex-direction: column-reverse</h3>
    <section class="direction-column-reverse">
        <div class="block">1</div>
        <div class="block">2</div>
        <div class="block">3</div>
    </section>
</body>

</html>
