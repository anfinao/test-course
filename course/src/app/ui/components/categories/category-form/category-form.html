<h2 mat-dialog-title>Создание категории</h2>
<mat-dialog-content>
    <form [formGroup]="form" (submit)="onSubmit()">
        <mat-form-field>
            <mat-label>Наименование</mat-label>
            <input matInput formControlName="name" placeholder="Наименование">
        </mat-form-field>
    </form>
</mat-dialog-content>
<mat-dialog-actions>
    <button matButton (click)="onSubmit()">Сохранить</button>
</mat-dialog-actions>
