<header class="header">
    <div class="header__inner container">
        <h1 class="header__logo" routerLink="">Мой Интернет-Магазин - Logo</h1>

        <nav class="header__nav nav" aria-label="Основная навигация">
            <ul class="nav__list">
            @for (link of links; track link.linkHref) {
                <li class="nav__item">
                    <a class="nav__link" [routerLink]="link.linkHref" routerLinkActive="nav__link--active">{{ link.title }}</a>
                </li>
            }
                <li class="nav__item">
                    <a class="nav__link" [routerLink]="[]" fragment="footer">Footer</a>
                </li>

                <!-- <li class="nav__item" (click)="toggleEditMode()" appCustomIf [condition]="true"> -->
                <li class="nav__item" (click)="toggleEditMode()" *appCanView="roles">
                        @if (isEditMode()) {
                            <mat-icon
                                svgIcon="my-icon"
                                matTooltip="Сохранить"
                            ></mat-icon>
                        } @else {
                            <mat-icon
                                matTooltip="Режим редактирования"
                                fontIcon="edit"
                            >
                            edit
                            </mat-icon>
                        }
